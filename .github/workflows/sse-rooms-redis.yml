---
name: sse-rooms-redis

on:
  pull_request:
    branches:
      - main
    paths:
      - 'packages/sse-rooms-redis/**'
      - 'lib/sse/rooms/**'
  push:
    branches:
      - main
    paths:
      - 'packages/sse-rooms-redis/**'
      - 'lib/sse/rooms/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sse-rooms-redis

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@008330803749db0355799c700092d9a85fd074e9 # v6.0.9

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
          cache: 'pnpm'

      - name: Install all dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Build root package
        run: pnpm run build
        working-directory: .

      - name: Run Tests
        run: pnpm test

      - name: Run Linting
        run: pnpm run lint
